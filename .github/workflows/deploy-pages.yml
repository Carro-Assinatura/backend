name: Deploy site no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_end_multi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front_end_multi/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_SHEETS_API_KEY: ${{ secrets.VITE_GOOGLE_SHEETS_API_KEY }}
          VITE_GOOGLE_SHEETS_ID: ${{ secrets.VITE_GOOGLE_SHEETS_ID }}
          VITE_GOOGLE_SHEETS_TAB: ${{ secrets.VITE_GOOGLE_SHEETS_TAB }}
          VITE_COLUMN_CAR_NAME: ${{ secrets.VITE_COLUMN_CAR_NAME }}
          VITE_COLUMN_CATEGORY: ${{ secrets.VITE_COLUMN_CATEGORY }}
          VITE_COLUMN_PRICE: ${{ secrets.VITE_COLUMN_PRICE }}
          VITE_COLUMN_IMAGE: ${{ secrets.VITE_COLUMN_IMAGE }}
          VITE_REMOVEBG_API_KEY: ${{ secrets.VITE_REMOVEBG_API_KEY }}
        run: npm run build

      - name: Copiar index para 404 (SPA)
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: front_end_multi/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
